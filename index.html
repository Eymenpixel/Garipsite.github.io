<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garip Bir Web Sitesi - Kırmızı Alarm</title>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none; /* Sayfa kaymasını tamamen engeller */
            transition: background-color 0.3s;
        }

        /* Kırmızı Alarm Durumu */
        body.alarm {
            background-color: #600 !important;
            color: #fff !important;
        }

        .face {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .eye {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pupil {
            width: 25px;
            height: 25px;
            background: black;
            border-radius: 50%;
            position: absolute;
            transition: 0.1s ease-out;
        }

        h1 {
            text-align: center;
            font-size: 22px;
            text-shadow: 2px 2px 10px currentColor;
            animation: glitch 1s infinite;
        }

        #run-away {
            padding: 15px 30px;
            font-size: 18px;
            background: currentColor;
            color: #000;
            border: none;
            position: absolute;
            font-weight: bold;
            border-radius: 5px;
            cursor: crosshair;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

    <div class="face">
        <div class="eye"><div class="pupil"></div></div>
        <div class="eye"><div class="pupil"></div></div>
    </div>

    <h1 id="status-text">YAKALAYABİLİR MİSİN?</h1>
    
    <button id="run-away">TIKLA BANA!</button>

    <script>
        const btn = document.getElementById('run-away');
        const eyes = document.querySelectorAll('.eye');
        const pupils = document.querySelectorAll('.pupil');
        const statusText = document.getElementById('status-text');
        let isCaught = false;

        // Gözleri merkeze sabitleme (Kırmızı mod için)
        function eyesToCenter() {
            pupils.forEach(p => p.style.transform = 'translate(0, 0)');
        }

        // Gözlerin takip etme fonksiyonu
        function moveEyes(clientX, clientY) {
            if (isCaught) return; // Eğer yakalandıysa takip etme
            
            eyes.forEach(eye => {
                const pupil = eye.querySelector('.pupil');
                const rect = eye.getBoundingClientRect();
                const eyeX = rect.left + rect.width / 2;
                const eyeY = rect.top + rect.height / 2;
                const angle = Math.atan2(clientY - eyeY, clientX - eyeX);
                const distance = 18;
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;
                pupil.style.transform = `translate(${x}px, ${y}px)`;
            });
        }

        // Mouse ve Dokunmatik Takibi
        document.addEventListener('mousemove', (e) => moveEyes(e.clientX, e.clientY));
        document.addEventListener('touchstart', (e) => moveEyes(e.touches[0].clientX, e.touches[0].clientY));
        document.addEventListener('touchmove', (e) => moveEyes(e.touches[0].clientX, e.touches[0].clientY));

        // Kaçma Fonksiyonu
        function escape() {
            if (isCaught) return;
            const maxX = window.innerWidth - btn.clientWidth - 50;
            const maxY = window.innerHeight - btn.clientHeight - 50;
            btn.style.left = Math.random() * maxX + 'px';
            btn.style.top = Math.random() * maxY + 'px';
        }

        btn.addEventListener('mouseover', escape);
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            escape();
        });

        // TIKLAMA OLAYI (Sistemi Patlatan Kısım)
        btn.addEventListener('click', () => {
            isCaught = true;
            document.body.classList.add('alarm');
            statusText.innerText = "YAKALANDIN! PARMAĞINI BASILI TUTARAK YAKALAMAN LAZIMDI!";
            btn.innerText = "HİLECİ!";
            eyesToCenter(); // Gözler merkeze (sana) baksın
            
            // 3 saniye sonra normale dönme şansı verelim mi? 
            // İstersen bu kısmı silebilirsin, hep kırmızı kalır.
            setTimeout(() => {
                isCaught = false;
                document.body.classList.remove('alarm');
                statusText.innerText = "YAKALAYABİLİR MİSİN?";
                btn.innerText = "TIKLA BANA!";
            }, 5000);
        });
    </script>
</body>
</html>
