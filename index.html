<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Garip Bir Web Sitesi</title>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            cursor: crosshair;
        }

        /* Takip eden gözler */
        .face {
            display: flex;
            gap: 20px;
            margin-bottom: 50px;
        }

        .eye {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pupil {
            width: 30px;
            height: 30px;
            background: black;
            border-radius: 50%;
            position: absolute;
        }

        h1 {
            text-shadow: 2px 2px 10px #0f0;
            animation: glitch 1s infinite;
        }

        /* Kaçan Buton */
        #run-away {
            padding: 15px 30px;
            font-size: 18px;
            background: #0f0;
            color: #000;
            border: none;
            cursor: pointer;
            position: absolute;
            transition: 0.1s;
            font-weight: bold;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .hint {
            position: fixed;
            bottom: 10px;
            font-size: 12px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="face">
        <div class="eye"><div class="pupil"></div></div>
        <div class="eye"><div class="pupil"></div></div>
    </div>

    <h1>BURASI BİRAZ GARİP...</h1>
    <p>Aşağıdaki butona tıklayabilir misin?</p>

    <button id="run-away">TIKLA BANA!</button>

    <div class="hint">İmleci takip eden gözlere dikkat et...</div>

    <script>
        // Gözlerin fareyi takip etmesi
        document.addEventListener('mousemove', (e) => {
            const eyes = document.querySelectorAll('.eye');
            eyes.forEach(eye => {
                const pupil = eye.querySelector('.pupil');
                const rect = eye.getBoundingClientRect();
                const eyeX = rect.left + rect.width / 2;
                const eyeY = rect.top + rect.height / 2;
                const angle = Math.atan2(e.clientY - eyeY, e.clientX - eyeX);
                
                const distance = 20;
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;
                
                pupil.style.transform = `translate(${x}px, ${y}px)`;
            });
        });

        // Kaçan Buton Mantığı
        const btn = document.getElementById('run-away');
        btn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - btn.clientWidth);
            const y = Math.random() * (window.innerHeight - btn.clientHeight);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        });

        // Butona bir şekilde tıklarsa (çok hızlıysa)
        btn.addEventListener('click', () => {
            alert('Vay canına, çok hızlısın! Sistemi bozdun.');
            document.body.style.backgroundColor = 'white';
            document.body.style.color = 'black';
        });
    </script>
</body>
</html>
