<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>??????</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background-color 0.5s;
        }

        #selection-screen { text-align: center; z-index: 100; }
        .btn-group { display: flex; gap: 20px; margin-top: 30px; justify-content: center; }
        .mode-btn {
            padding: 15px 30px;
            font-size: 18px;
            background: transparent;
            color: #0f0;
            border: 2px solid #0f0;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .mode-btn:hover { background: #0f0; color: #000; }

        #game-area {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .face { display: flex; gap: 20px; margin-bottom: 40px; }
        .eye {
            width: 70px; height: 70px;
            background: white; border-radius: 50%;
            position: relative; display: flex;
            align-items: center; justify-content: center;
        }
        .pupil {
            width: 28px; height: 28px;
            background: black; border-radius: 50%;
            position: absolute;
            transition: transform 0.1s ease-out;
        }

        #run-away {
            padding: 15px 30px;
            font-size: 18px;
            background: #0f0;
            color: #000;
            border: none;
            position: absolute;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            touch-action: none;
            transition: left 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        /* Kalp GIF Stili */
        #heart-gif {
            display: none;
            position: absolute;
            width: 200px; /* Gif'i buradan büyütebilirsin */
            height: auto;
            transform: translate(-50%, -50%); /* Tam butonun ortasına gelsin */
            z-index: 100;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="selection-screen">
        <h1>MODUNU SEÇ</h1>
        <div class="btn-group">
            <button class="mode-btn" onclick="startGame('pc')">BİLGİSAYAR</button>
            <button class="mode-btn" onclick="startGame('mobile')">MOBİL</button>
        </div>
    </div>

    <div id="game-area">
        <div class="face">
            <div class="eye"><div class="pupil"></div></div>
            <div class="eye"><div class="pupil"></div></div>
        </div>
        <h2 id="status-text">YAKALAYABİLECEK MİSİN?</h2>
        <button id="run-away">TIKLA BANA!</button>
        <!-- Kalp GIF burada (Repo'daki kalp.gif dosyasını kullanır) -->
        <img id="heart-gif" src="kalp.gif" alt="Kalp Animasyonu">
    </div>

    <script>
        const selectionScreen = document.getElementById('selection-screen');
        const gameArea = document.getElementById('game-area');
        const btn = document.getElementById('run-away');
        const statusText = document.getElementById('status-text');
        const heartGif = document.getElementById('heart-gif');
        const pupils = document.querySelectorAll('.pupil');
        let currentMode = '';
        let isCaught = false;

        function startGame(mode) {
            currentMode = mode;
            selectionScreen.classList.add('hidden');
            gameArea.style.display = 'flex';
            escape();
        }

        function handleMove(x, y) {
            if (isCaught) return;
            const eyes = document.querySelectorAll('.eye');
            eyes.forEach(eye => {
                const pupil = eye.querySelector('.pupil');
                const rect = eye.getBoundingClientRect();
                const eyeX = rect.left + rect.width / 2;
                const eyeY = rect.top + rect.height / 2;
                const angle = Math.atan2(y - eyeY, x - eyeX);
                const dist = 18;
                pupil.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            });
        }

        window.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
        window.addEventListener('touchstart', (e) => handleMove(e.touches[0].clientX, e.touches[0].clientY));

        function escape() {
            if (isCaught) return;
            const padding = 100;
            const x = Math.random() * (window.innerWidth - btn.clientWidth - padding) + padding/2;
            const y = Math.random() * (window.innerHeight - btn.clientHeight - padding) + padding/2;
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        btn.addEventListener('mouseenter', () => { if(currentMode === 'pc') escape(); });
        btn.addEventListener('touchstart', (e) => { if(currentMode === 'mobile') { e.preventDefault(); escape(); } });

        // TIKLAYINCA OLACAKLAR
        btn.addEventListener('click', () => {
            isCaught = true;
            
            // 1. Butonun konumunu al
            const btnLeft = btn.style.left;
            const btnTop = btn.style.top;

            // 2. Butonu ve gözleri gizle, sadece arka plan kalsın
            btn.style.display = 'none';
            document.querySelector('.face').style.visibility = 'hidden';
            statusText.style.visibility = 'hidden';

            // 3. GIF'i butonun olduğu yere koy ve göster
            heartGif.style.left = btnLeft;
            heartGif.style.top = btnTop;
            heartGif.style.display = 'block';

            // 4. 3 saniye sonra sayfayı yenile (veya gif süresine göre ayarla)
            setTimeout(() => {
                location.reload(); // Sayfayı yeniler
            }, 3000); 
        });
    </script>
</body>
</html>
