<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Garip Dünya - Modunu Seç</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background-color 0.5s;
        }

        /* SEÇİM EKRANI */
        #selection-screen {
            text-align: center;
            z-index: 100;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .mode-btn {
            padding: 20px 40px;
            font-size: 20px;
            background: transparent;
            color: #0f0;
            border: 2px solid #0f0;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .mode-btn:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 20px #0f0;
        }

        /* OYUN ALANI (Başta Gizli) */
        #game-area {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .face { display: flex; gap: 20px; margin-bottom: 40px; }
        .eye {
            width: 80px; height: 80px;
            background: white; border-radius: 50%;
            position: relative; display: flex;
            align-items: center; justify-content: center;
        }
        .pupil {
            width: 30px; height: 30px;
            background: black; border-radius: 50%;
            position: absolute;
        }

        #run-away {
            padding: 15px 30px;
            font-size: 18px;
            background: #0f0;
            color: #000;
            border: none;
            position: absolute;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            touch-action: none;
        }

        /* KIRMIZI MOD */
        body.alarm { background-color: #800 !important; color: #fff !important; }
        body.alarm #run-away { background-color: #fff; color: #800; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- GİRİŞ EKRANI -->
    <div id="selection-screen">
        <h1>CİHAZINI SEÇ</h1>
        <p>Hangi gerçeklikten geliyorsun?</p>
        <div class="btn-group">
            <button class="mode-btn" onclick="startGame('pc')">BİLGİSAYAR</button>
            <button class="mode-btn" onclick="startGame('mobile')">MOBİL</button>
        </div>
    </div>

    <!-- OYUN ALANI -->
    <div id="game-area">
        <div class="face">
            <div class="eye"><div class="pupil"></div></div>
            <div class="eye"><div class="pupil"></div></div>
        </div>
        <h2 id="status-text">HAZIR MISIN?</h2>
        <button id="run-away">TIKLA BANA!</button>
    </div>

    <script>
        const selectionScreen = document.getElementById('selection-screen');
        const gameArea = document.getElementById('game-area');
        const btn = document.getElementById('run-away');
        const statusText = document.getElementById('status-text');
        const pupils = document.querySelectorAll('.pupil');
        let currentMode = '';
        let isCaught = false;

        function startGame(mode) {
            currentMode = mode;
            selectionScreen.classList.add('hidden');
            gameArea.style.display = 'flex';
            
            if(mode === 'pc') {
                statusText.innerText = "FAREYLE YAKALAYABİLİR MİSİN?";
            } else {
                statusText.innerText = "DOKUNARAK YAKALAYABİLİR MİSİN?";
            }
        }

        // Göz Takibi
        function handleMove(x, y) {
            if (isCaught) return;
            const eyes = document.querySelectorAll('.eye');
            eyes.forEach(eye => {
                const pupil = eye.querySelector('.pupil');
                const rect = eye.getBoundingClientRect();
                const eyeX = rect.left + rect.width / 2;
                const eyeY = rect.top + rect.height / 2;
                const angle = Math.atan2(y - eyeY, x - eyeX);
                const dist = 20;
                pupil.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            });
        }

        window.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => handleMove(e.touches[0].clientX, e.touches[0].clientY));

        // Kaçma Mantığı
        function escape() {
            if (isCaught) return;
            const padding = 60;
            const x = Math.random() * (window.innerWidth - btn.clientWidth - padding) + padding/2;
            const y = Math.random() * (window.innerHeight - btn.clientHeight - padding) + padding/2;
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        // PC Modu Kaçışı
        btn.addEventListener('mouseenter', () => {
            if(currentMode === 'pc') escape();
        });

        // Mobil Modu Kaçışı
        btn.addEventListener('touchstart', (e) => {
            if(currentMode === 'mobile') {
                e.preventDefault();
                escape();
            }
        });

        // Yakalanma Durumu (Hile veya hız)
        btn.addEventListener('click', () => {
            isCaught = true;
            document.body.classList.add('alarm');
            pupils.forEach(p => p.style.transform = 'translate(0,0)');
            
            if(currentMode === 'mobile') {
                statusText.innerHTML = "YAKALANDIN!<br>PARMAĞINI BASILI TUTARAK YAKALAMAN LAZIMDI!";
            } else {
                statusText.innerHTML = "SİSTEM ÇÖKTÜ!<br>FAREYİ ÇOK HIZLI KULLANDIN!";
            }
            
            btn.innerText = "HİLECİ!";
            
            setTimeout(() => {
                isCaught = false;
                document.body.classList.remove('alarm');
                btn.innerText = "TIKLA BANA!";
                statusText.innerText = "TEKRAR DENE!";
                escape();
            }, 4000);
        });
    </script>
</body>
</html>
